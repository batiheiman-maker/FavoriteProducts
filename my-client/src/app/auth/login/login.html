<div class="login-container">
  <div class="login-card">

    <div class="login-logo">🛍</div>
    <h2>כניסה לחשבון</h2>
    <p class="subtitle">ברוך הבא! הזן את פרטיך להמשך</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <div class="field">
        <label>שם משתמש</label>
        <input
          type="text"
          placeholder="הזן שם משתמש"
          formControlName="userName"
        />
      </div>

      <div class="field">
        <label>סיסמה</label>
        <input
          type="password"
          placeholder="הזן סיסמה"
          formControlName="password"
        />
      </div>

      @if (store.errorMsg()) {
        <p class="error">{{ store.errorMsg() }}</p>
      }

      <button
        type="submit"
        class="btn"
        [disabled]="loginForm.invalid || store.loading()"
      >
        @if (store.loading()) {
          מתחבר...
        } @else {
          כניסה
        }
      </button>

    </form>

    <hr />

    <p class="footer">
      אין לך משתמש?
      <a routerLink="/register">הרשמה</a>
    </p>

  </div>
</div>
