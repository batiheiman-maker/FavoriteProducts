<div class="admin-page">

  <header class="admin-header">
    <h2>לוח מנהל</h2>
    <button (click)="logout()" class="btn-logout">יציאה</button>
  </header>

  <main>
    <h3>רשימת משתמשים</h3>

    @if (loading) {
      <p class="loading-msg">טוען משתמשים...</p>
    } @else if (errorMsg) {
      <p class="error">{{ errorMsg }}</p>
    } @else if (users.length === 0) {
      <p>אין משתמשים רשומים.</p>
    } @else {
      <table class="users-table">
        <thead>
          <tr>
            <th>מזהה</th>
            <th>שם משתמש</th>
            <th>כניסה כמשתמש</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user.id) {
            <tr>
              <td>{{ user.id }}</td>
              <td>{{ user.userName }}</td>
              <td>
                <button class="btn-login-as" (click)="loginAs(user)">
                  כנס כ־{{ user.userName }}
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    }
  </main>

</div>
